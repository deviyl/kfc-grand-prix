<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Prix Results</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/deviyl/icon/refs/heads/main/devicon-modified.png">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="view-races.css">
</head>
<body>
    <div class="races-container">
        <header class="races-header">
            <div class="header-content">
                <h1>🏁 KFC Grand Prix Results</h1>
            </div>
        </header>

        <section class="races-section">
            <div class="event-selector">
                <label for="eventSelect">Select Event:</label>
                <select id="eventSelect" class="event-dropdown">
                    <option value="">Loading events...</option>
                </select>
                <button id="refreshBtn" style="padding:12px 24px;background:#d4af37;color:#1a1a1a;border:none;border-radius:4px;cursor:pointer;font-weight:600;white-space:nowrap;">🔄 Refresh</button>
            </div>
        </section>

        <section id="eventInfoPanel" class="races-section event-info-panel" style="display: none;">
            <div class="event-info-header">
                <div>
                    <h2 id="eventTitle">Event Name</h2>
                </div>
                <div class="event-meta">
                    <div class="meta-item">
                        <span class="meta-label">Races:</span>
                        <span id="eventRaceCount" class="meta-value"></span>
                    </div>
                </div>
            </div>

            <div id="prizesSection" class="prizes-section" style="display: none;">
                <h3>Prizes</h3>
                <div class="prizes-grid">
                    <div class="prize-card">
                        <div class="prize-rank">🥇 1st Place</div>
                        <div id="prize1Display" class="prize-amount"></div>
                    </div>
                    <div class="prize-card">
                        <div class="prize-rank">🥈 2nd Place</div>
                        <div id="prize2Display" class="prize-amount"></div>
                    </div>
                    <div class="prize-card">
                        <div class="prize-rank">🥉 3rd Place</div>
                        <div id="prize3Display" class="prize-amount"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="races-section">
            <div class="tabs-container">
                <button class="tab-button active" data-tab="standings">Standings</button>
                <button class="tab-button" data-tab="races">Race Results</button>
            </div>

            <div id="standingsTab" class="tab-content active">
                <div id="individualStandingsContainer">
                    <h3>Individual Standings</h3>
                    <div id="individualStandingsDisplay" class="standings-display"></div>
                </div>

                <div id="teamStandingsContainer" style="display: none;">
                    <h3>Team Standings</h3>
                    <div id="teamStandingsDisplay" class="standings-display"></div>
                </div>
            </div>

            <div id="racesTab" class="tab-content">
                <div id="racesResultsDisplay" class="races-results-container"></div>
            </div>
        </section>

        <div id="emptyState" class="empty-state" style="display: none;">
            <h2>No Events Available</h2>
            <p>No race events have been created yet. Check back soon!</p>
        </div>
    </div>

    <script src="view-races.js"></script>
</body>
</html>
