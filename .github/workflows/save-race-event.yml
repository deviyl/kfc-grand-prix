name: Save Race Event

on:
  workflow_dispatch:
    inputs:
      event_name:
        description: 'Event name'
        required: true
        type: string
      event_data:
        description: 'Event data as JSON'
        required: true
        type: string

jobs:
  save-event:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create races directory
        run: mkdir -p races

      - name: Save event JSON
        run: |
          echo '${{ inputs.event_data }}' > races/${{ inputs.event_name }}.json

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add races/${{ inputs.event_name }}.json
          git commit -m "Update event: ${{ inputs.event_name }}" || true
          git push

      - name: Return success
        run: echo "Event saved successfully"
